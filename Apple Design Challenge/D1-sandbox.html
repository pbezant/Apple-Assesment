<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>D1 · Mission Control — Sandbox</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f0eee9; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wf-primitives.jsx"></script>
<script type="text/babel" src="dir1-mission-control.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "approvalMode": "interactive"
}/*EDITMODE-END*/;

const W = 720, H = 480;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const m = t.approvalMode;

  return (
    <>
      <DesignCanvas>
        <DCSection id="d1" title="Direction 1 · Mission Control · sandbox"
          subtitle="Iterating on D1 in isolation. Changes here can be folded back into Wireframes.html when ready.">
          <DCArtboard id="d1-1" label="① Repo picker · fleet grid (merged)" width={W} height={H}><D1RepoPicker mode={m} /></DCArtboard>
          <DCArtboard id="d1-2" label="② Repo · new agent (action-first)" width={W} height={H}><D1Insights /></DCArtboard>
          <DCArtboard id="d1-4" label="③ Live execution" width={W} height={H}><D1Live mode={m} /></DCArtboard>
          <DCArtboard id="d1-5" label="④ PR review" width={W} height={H}><D1Results /></DCArtboard>
          <DCArtboard id="d1-6" label="⑤ Fleet history" width={W} height={H}><D1History /></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="D1 sandbox tweaks">
        <TweakSection label="Approval model" />
        <TweakRadio label="Mode"
          value={t.approvalMode}
          options={[
            { value: 'fireforget', label: 'fire' },
            { value: 'plan',       label: 'plan' },
            { value: 'checkpoint', label: 'check' },
            { value: 'interactive',label: 'inter' },
          ]}
          onChange={(v) => setTweak('approvalMode', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
